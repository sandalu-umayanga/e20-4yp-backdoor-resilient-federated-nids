defaults:
  - _self_

simulation:
  rounds: 15 
  n_clients: 10
  fraction: 1.0
  partition_method: "iid"
  alpha: 0.5

client:
  epochs: 5  # FL: Use 3-5 local epochs per round (not 30!)
  lr: 0.001  # M12: Lower learning rate for Adam
  batch_size: 512  # M12: Standard batch size
  device: "cuda"
  
  # M12 Configuration
  use_class_weights: true
  weight_method: "sqrt"  # 'sqrt' (moderate) or 'inverse' (aggressive)
  use_scheduler: false  # Disable for FL - too few local epochs
  early_stopping_patience: 3  # Keep for safety, but unlikely to trigger with 5 epochs

server:
  defense: "krum"   # "avg", "median", "trimmed_mean", "krum", "multi_krum", "flame"
  expected_malicious: 3  # Defender's ESTIMATE of malicious clients (safety condition n>2f+2) (used by "krum")
  # FLAME: Differential Privacy noise parameters (required for DP guarantee — Theorem 1)
  privacy:
    epsilon: 300.0   # Privacy budget. Higher = less noise, less privacy.
    delta: 1.0e-5    # Failure probability (typically 1/n² where n = dataset size)

data:
  path: "data/unsw-nb15/processed/train_pool.pt"
  classification_mode: "binary"  # Options: "binary" (Normal vs Attack), "multiclass" (10 classes)

# W&B Configuration (tags auto-generated from config)
tags: []

#😈 RED TEAM SECTION
attack:
  type: "backdoor"   # Options: clean, backdoor, label_flip
  poison_ratio: 0.3
  trigger_feat_idx: 0
  trigger_value: 5.0
  target_label: 0
  source_label: 3    # Only used for label_flip
  flip_to_label: 0   # Only used for label_flip
  
  aggressive: false         # Enable Model Replacement
  stealth: true            # Enable stealth mode (Krum bypass)
  target_norm_bound: 10    # L2 norm "speed limit" for stealth scaling
  estimated_n_clients: 10  # Model replacement scale factor — MUST match simulation.n_clients (used oly for Model replacement attacks)

  # How many attackers?
  num_malicious_clients: 3  # Example: 10% of the network (4 out of 40) (used by attacker)
